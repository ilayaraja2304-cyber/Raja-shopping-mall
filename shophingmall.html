<!DOCTYPE html>
<html>
<head>
<title>Raja Shopping Mall</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:url("https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da") no-repeat center/cover;
    background-size:cover;
}

/* Header */
header{
    background:rgba(0,0,0,0.8);
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:80px;
    height:80px;
    border-radius:50%;
}

.logo h1{
    color:yellow;
    font-size:30px;
}

/* Menu Buttons */
.menu button{
    padding:10px 20px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    margin:5px;
    cursor:pointer;
    font-size:16px;
}

.menu button:hover{
    background:orange;
}

/* Title */
.title{
    text-align:center;
    background:white;
    color:red;
    font-size:40px;
    font-weight:bold;
    padding:15px;
    letter-spacing:3px;
}

/* Offer */
.offer{
    background:orange;
    text-align:center;
    padding:10px;
    font-size:22px;
    font-weight:bold;
}

/* Scroll Text */
.scroll{
    background:yellow;
    overflow:hidden;
    white-space:nowrap;
    padding:10px;
}

.scroll span{
    display:inline-block;
    padding-left:100%;
    animation:move 10s linear infinite;
    font-weight:bold;
}

@keyframes move{
    0%{
        transform:translateX(0);
    }
    100%{
        transform:translateX(-100%);
    }
}

/* Product Section */
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    padding:30px;
}

.card{
    width:230px;
    background:white;
    border-radius:15px;
    text-align:center;
    padding:15px;
    box-shadow:0 0 15px black;
    transition:0.5s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:200px;
    border-radius:10px;
}

.card h3{
    color:darkblue;
}

.price{
    color:red;
    font-size:22px;
    font-weight:bold;
}

.card button{
    padding:10px 20px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.card button:hover{
    background:red;
}

/* Payment Section */
.payment{
    background:white;
    text-align:center;
    padding:20px;
}

.payment img{
    width:90px;
    margin:10px;
}

.pay-btn{
    padding:12px 25px;
    background:#00baf2;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

.pay-btn:hover{
    background:blue;
}

/* Footer */
footer{
    background:black;
    color:white;
    text-align:center;
    padding:15px;
    font-size:18px;
}

</style>
</head>

<body>

<!-- Header -->
<header>

<div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
    <h1>RAJA MALL</h1>
</div>

<div class="menu">
    <a href="#">
        <button>Food Market</button>
    </a>

   

    <a href="#">
        <button>Contact</button>
    </a>
</div>

</header>

<!-- Title -->
<div class="title">
    RAJA SHOPPING MALL
</div>

<!-- Offer -->
<div class="offer">
    🔥 SUMMER OFFER 20% OFF 🔥
</div>

<!-- Scrolling Offer -->
<div class="scroll">
    <span>
        Big Sale | Free Delivery | Buy 1 Get 1 Free | Shopping Festival Offer
    </span>
</div>

<!-- Products -->
<div class="products">

    <!-- Creatine -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1593095948071-474c5cc2989d">
        <h3>Creatine</h3>
        <p class="price">₹500</p>
        <button onclick="buyProduct('Creatine')">Buy Now</button>
    </div>

    <!-- Watch -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
        <h3>Smart Watch</h3>
        <p class="price">₹2000</p>
        <button onclick="buyProduct('Smart Watch')">Buy Now</button>
    </div>

    <!-- Shoes -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
        <h3>Shoes</h3>
        <p class="price">₹1200</p>
        <button onclick="buyProduct('Shoes')">Buy Now</button>
    </div>

    <!-- Mobile -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
        <h3>Mobile</h3>
        <p class="price">₹15000</p>
        <button onclick="buyProduct('Mobile')">Buy Now</button>
    </div>

    <!-- Headphone -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e">
        <h3>Headphones</h3>
        <p class="price">₹2500</p>
        <button onclick="buyProduct('Headphones')">Buy Now</button>
    </div>

</div>

<!-- Payment Methods -->
<div class="payment">

<h2>Payment Methods</h2>

<img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Visa.svg">

<img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/MasterCard_Logo.svg">

<img src="https://upload.wikimedia.org/wikipedia/commons/7/71/Google_Pay_Logo.svg">

<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Paytm_logo.png">

<img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/PhonePe_Logo.svg">

<img src="https://upload.wikimedia.org/wikipedia/commons/f/fd/RuPay.svg">

<br><br>

<button class="pay-btn" onclick="paytmBackend()">
    Pay With Paytm
</button>

</div>

<!-- Footer -->
<footer>
    © 2026 Raja Shopping Mall | All Rights Reserved
</footer>

<!-- JavaScript Backend -->

<script>

function buyProduct(product){

    alert(product + " Added To Cart Successfully!");

}

function paytmBackend(){

    let username = prompt("Enter Your Name");

    let product_name=prompt("Enter your product_name");
    let mobile = prompt("Enter Mobile Number");
    
    let amount = prompt("Enter Payment Amount");

    if(username == "" || mobile == "" || amount == ""){

        alert("❌ Please Fill All Details");

    }

    else{

        let transactionId = "PAYTM" + Math.floor(Math.random() * 1000000);

        alert(
        "✅ Payment Successful\n\n" +
        "Transaction ID : " + transactionId + "\n" +
        "Customer : " + username + "\n" +
        "product_name: " + product_name + "\n" +
        "Mobile : " + mobile + "\n" +
        "Amount Paid : ₹" + amount

        );

    }

}

</script>

</body>
</html>
